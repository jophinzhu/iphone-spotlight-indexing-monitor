name: Build & Release Windows Executable

on:
  push:
    tags:
      - "v*"  # Trigger on version tags like v0.1.0
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Needed to create releases

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install "pyinstaller>=6.0"

      - name: Build executable
        run: pyinstaller --onefile --name spotlight-monitor --paths src --add-data "vendor/libimobiledevice;libimobiledevice" src/spotlight_monitor/__main__.py

      - name: Verify executable
        run: echo "" | dist\spotlight-monitor.exe --version

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: spotlight-monitor-windows
          path: dist/spotlight-monitor.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/spotlight-monitor.exe
          generate_release_notes: true
